[build]
  builder      = "NIXPACKS"
  buildCommand = "./mvnw clean package -DskipTests"

[deploy]
  startCommand       = "java -jar target/backend-0.0.1-SNAPSHOT.jar"
  healthcheckPath    = "/actuator/health"
  healthcheckTimeout = 300

  [deploy.restartPolicy]
    condition  = "on_failure"
    maxRetries = 10
